<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Visualize</title>

    <!-- CodeMirror 5 (loaded dynamically from CDN by codemirror-loader.js) -->
    <script src="js/codemirror-loader.js"></script>

    <!-- App styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="header">
        <div class="header-left">
            <span class="app-name">Container Visualize</span>
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search files... (Ctrl+P)" autocomplete="off" spellcheck="false">
                <div id="search-results" class="search-results"></div>
            </div>
        </div>
        <div class="header-right">
            <span id="container-badge" class="container-badge"></span>
            <button id="btn-upload" class="header-btn" title="Upload file"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 10V2"/><path d="M4 5l4-4 4 4"/><path d="M2 14h12"/></svg></button>
            <button id="btn-download" class="header-btn" title="Download"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8"/><path d="M4 7l4 4 4-4"/><path d="M2 14h12"/></svg></button>
            <button id="btn-theme" class="header-btn" title="Toggle theme"><svg id="theme-icon-dark" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6 1a7 7 0 1 0 7.5 10.5A5.5 5.5 0 0 1 6 1z"/></svg><svg id="theme-icon-light" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:none"><circle cx="8" cy="8" r="3.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg></button>
            <button id="btn-refresh" class="header-btn" title="Refresh tree">&#x21bb;</button>
        </div>
    </header>

    <main id="main">
        <aside id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Files</span>
            </div>
            <div id="file-tree" class="file-tree" tabindex="0"></div>
        </aside>
        <div id="resize-handle" class="resize-handle"></div>
        <section id="content">
            <div id="editor-panel" class="editor-panel">
                <div class="empty-state">
                    <p>Select a file to view its contents</p>
                </div>
            </div>
        </section>
    </main>

    <footer id="status-bar">
        <div class="status-left">
            <span id="status-connection" class="status-connection">
                <span class="status-dot connected"></span>
                <span id="status-connection-text">Connected</span>
            </span>
        </div>
        <div class="status-center">
            <span id="status-file-info"></span>
        </div>
        <div class="status-right">
            <span id="status-container"></span>
        </div>
    </footer>

    <!-- Connection lost overlay -->
    <div id="connection-overlay" class="connection-overlay" style="display:none">
        <div class="connection-overlay-content">
            <div class="connection-spinner"></div>
            <p class="connection-title">Connection to Docker lost</p>
            <p class="connection-subtitle">Retrying...</p>
        </div>
    </div>

    <!-- Container stopped banner -->
    <div id="container-stopped-banner" class="container-stopped-banner" style="display:none">
        <span>Container has stopped.</span>
        <button id="btn-reconnect" class="banner-btn">Reconnect</button>
    </div>

    <!-- App scripts (order matters) -->
    <script src="js/api.js"></script>
    <script src="js/tree.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/toolbar.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
